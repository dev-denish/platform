name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.8.4 mypy==1.14.0
      - name: Ruff (lint + import order)
        run: ruff check .
      - name: Mypy (type check)
        run: mypy app || true   # advisory in Phase 1; gating once fully annotated

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: dmrv
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: dmrv_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dmrv -d dmrv_test"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      DMRV_ENVIRONMENT: test
      DMRV_JWT_SECRET: ci-only-secret-that-is-definitely-long-enough-xxxx
      DMRV_DB_HOST: localhost
      DMRV_DB_PORT: "5432"
      DMRV_DB_USER: dmrv
      DMRV_DB_PASSWORD: ci-password
      DMRV_DB_NAME: dmrv_test
      DMRV_TEST_DATABASE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,s3]"
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run tests (unit + API + DB integration) with coverage
        run: pytest --cov=app --cov-report=term-missing -m "not skip"

  build-scan:
    runs-on: ubuntu-latest
    needs: [lint-type, test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t dmrv-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t dmrv-frontend:ci ./frontend

      - name: Trivy scan (backend, fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: dmrv-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: dmrv-frontend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Python dependency audit
        working-directory: backend
        run: |
          pip install pip-audit==2.7.3
          pip-audit --strict || true   # advisory until a lockfile is pinned in Phase 2

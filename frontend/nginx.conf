# nginx config for the built SPA (unprivileged image: listens on 8080 as non-root).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (defense-in-depth; the API sets its own too).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # Hashed assets are immutable -> cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

    # Reverse-proxy API calls to the backend service (used by docker-compose;
    # in Kubernetes the Ingress routes /api to the backend Service instead).
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2048m;   # allow large raster uploads through the proxy
        proxy_read_timeout 300s;
    }

    # Dev-only: raster preview images. The API's LocalStorage backend serves these
    # from its own /previews mount (see app/main.py); proxy them through so the SPA's
    # relative preview_url values resolve same-origin instead of hitting the SPA
    # catch-all below. In cloud, previews come back as absolute S3 presigned URLs
    # and this location is simply unused.
    location /previews/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
    }

    # SPA history fallback: unknown routes serve index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
